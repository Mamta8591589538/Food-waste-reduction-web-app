<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – FoodSaver</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">🌱</div>
      <h2>Create Account</h2>
      <p>Start saving food today</p>
    </div>

    <div id="alertBox"></div>

    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" id="username" class="form-control" placeholder="John Doe">
    </div>

    <div class="mb-3">
      <label class="form-label">Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="you@example.com">
    </div>

    <div class="mb-4">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Min. 6 characters">
    </div>

    <button class="btn btn-success w-100 py-3 mb-3" id="regBtn" onclick="register()">
      Create Account
    </button>

    <p class="text-center text-muted mb-0" style="font-size:0.9rem">
      Already have an account?
      <a href="login.html" style="color:var(--primary); font-weight:600; text-decoration:none;">
        Sign in →
      </a>
    </p>
  </div>
</div>

<script>
  fetch('/me').then(r=>r.json()).then(d => {
    if (d.loggedIn) location.href = 'dashboard.html';
  });

  async function register() {
    const btn = document.getElementById('regBtn');
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !email || !password) {
      showAlert('Please fill in all fields.', 'warning'); return;
    }
    if (password.length < 6) {
      showAlert('Password must be at least 6 characters.', 'warning'); return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account...';

    const res = await fetch('/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password })
    });
    const data = await res.json();

    if (data.success) {
      showAlert('Account created! Redirecting to login...', 'success');
      setTimeout(() => location.href = 'login.html', 1200);
    } else {
      showAlert(data.message, 'danger');
      btn.disabled = false;
      btn.innerHTML = 'Create Account';
    }
  }

  function showAlert(msg, type) {
    document.getElementById('alertBox').innerHTML =
      `<div class="alert alert-${type} py-2" style="border-radius:10px;font-size:0.9rem">${msg}</div>`;
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') register();
  });
</script>
</body>
</html>
