<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Grocery – FoodSaver</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .unit-badge {
      display: inline-block;
      background: #d1fae5;
      color: #1fd29f;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-left: 8px;
      transition: all 0.2s;
    }
    .step-indicator {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }
    .step {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: #e5e7eb;
    }
    .step.active { background: var(--primary); }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html"><span>🌱</span> FoodSaver</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-center gap-1">
        <li class="nav-item"><a class="nav-link" href="dashboard.html">📊 Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="inventory.html">🥗 Inventory</a></li>
        <li class="nav-item"><a class="nav-link active" href="addFood.html">➕ Add Grocery</a></li>
        <li class="nav-item ms-2">
          <span class="nav-link" style="opacity:0.7;font-size:0.85rem" id="navUser">👤 ...</span>
        </li>
        <li class="nav-item">
          <button class="btn btn-sm" style="background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3);border-radius:8px" onclick="logout()">Sign Out</button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="container">
    <h1>➕ Add Grocery</h1>
    <p>Track a new food item in your inventory</p>
  </div>
</div>

<div class="container" style="margin-top:48px; padding-bottom:60px">
  <div class="add-food-card">

    <div id="alertBox"></div>

    <!-- FOOD NAME + AUTO UNIT -->
    <div class="mb-4">
      <label class="form-label">
        Food Name
        <span id="unitBadge" class="unit-badge" style="display:none"></span>
      </label>
      <input type="text" id="foodName" class="form-control" placeholder="e.g. Rice, Milk, Bread, Apples..."
             oninput="onNameInput()">
      <small class="text-muted mt-1 d-block">Unit will be auto-detected as you type</small>
    </div>

    <!-- QUANTITY + UNIT -->
    <div class="row g-3 mb-4">
      <div class="col-7">
        <label class="form-label">Quantity</label>
        <input type="number" id="foodQty" class="form-control" placeholder="e.g. 2" min="0.1" step="0.1">
      </div>
      <div class="col-5">
        <label class="form-label">Unit</label>
        <input type="text" id="foodUnit" class="form-control" placeholder="Auto" readonly
               style="background:#f9fafb; color: var(--text-muted)">
      </div>
    </div>

    <!-- GROCERY TYPE -->
    <div class="mb-4">
      <label class="form-label">Grocery Type</label>
      <div class="d-flex gap-3">
        <label class="d-flex align-items-center gap-2 p-3 rounded-3 cursor-pointer flex-fill"
               style="border:2px solid #e5e7eb; cursor:pointer; transition:0.2s" id="lblWeekly"
               onclick="selectType('weekly')">
          <input type="radio" name="type" value="weekly" id="typeWeekly" style="display:none" checked>
          <span style="font-size:1.2rem">📅</span>
          <div>
            <div style="font-weight:600;font-size:0.9rem">Weekly</div>
            <div style="font-size:0.75rem;color:var(--text-muted)">Consumed weekly</div>
          </div>
        </label>
        <label class="d-flex align-items-center gap-2 p-3 rounded-3 cursor-pointer flex-fill"
               style="border:2px solid #e5e7eb; cursor:pointer; transition:0.2s" id="lblMonthly"
               onclick="selectType('monthly')">
          <input type="radio" name="type" value="monthly" id="typeMonthly" style="display:none">
          <span style="font-size:1.2rem">🗓️</span>
          <div>
            <div style="font-weight:600;font-size:0.9rem">Monthly</div>
            <div style="font-size:0.75rem;color:var(--text-muted)">Consumed monthly</div>
          </div>
        </label>
      </div>
    </div>

    <!-- DATES -->
    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <label class="form-label">Purchase Date</label>
        <input type="date" id="purchaseDate" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Expiry Date</label>
        <input type="date" id="expiryDate" class="form-control">
      </div>
    </div>

    <!-- BUTTONS -->
    <div class="d-flex gap-3">
      <button class="btn btn-success flex-fill py-3" id="addBtn" onclick="addFood()">
        ✅ Add to Inventory
      </button>
      <a href="inventory.html" class="btn btn-outline-success py-3 px-4">
        Cancel
      </a>
    </div>

  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script>
  checkAuth();

  // Set today as default purchase date
  document.getElementById('purchaseDate').value = new Date().toISOString().split('T')[0];

  // Highlight weekly by default
  selectType('weekly');

  function onNameInput() {
    const name = document.getElementById('foodName').value;
    const unit = detectUnit(name);
    document.getElementById('foodUnit').value = unit;
    const badge = document.getElementById('unitBadge');
    if (name.trim()) {
      badge.textContent = '📦 ' + unit;
      badge.style.display = 'inline-block';
    } else {
      badge.style.display = 'none';
    }
  }

  function selectType(val) {
    document.getElementById('typeWeekly').checked = (val === 'weekly');
    document.getElementById('typeMonthly').checked = (val === 'monthly');
    document.getElementById('lblWeekly').style.borderColor = val === 'weekly' ? 'var(--primary)' : '#e5e7eb';
    document.getElementById('lblWeekly').style.background = val === 'weekly' ? '#f0fdf4' : 'white';
    document.getElementById('lblMonthly').style.borderColor = val === 'monthly' ? 'var(--primary)' : '#e5e7eb';
    document.getElementById('lblMonthly').style.background = val === 'monthly' ? '#f0fdf4' : 'white';
  }

  async function addFood() {
    const name = document.getElementById('foodName').value.trim();
    const quantity = document.getElementById('foodQty').value;
    const unit = detectUnit(name);
    const purchaseDate = document.getElementById('purchaseDate').value;
    const expiryDate = document.getElementById('expiryDate').value;
    const type = document.getElementById('typeWeekly').checked ? 'weekly' : 'monthly';

    if (!name || !quantity || !purchaseDate || !expiryDate) {
      showAlert('Please fill in all fields.', 'warning'); return;
    }

    if (new Date(expiryDate) <= new Date(purchaseDate)) {
      showAlert('Expiry date must be after purchase date.', 'warning'); return;
    }

    const btn = document.getElementById('addBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Adding...';

    const res = await fetch('/foods', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, quantity: parseFloat(quantity), unit, purchaseDate, expiryDate, type })
    });
    const data = await res.json();

    if (data.success) {
      showAlert('✅ ' + name + ' added to inventory!', 'success');
      setTimeout(() => location.href = 'inventory.html', 1000);
    } else {
      showAlert(data.message || 'Failed to add food', 'danger');
      btn.disabled = false;
      btn.innerHTML = '✅ Add to Inventory';
    }
  }

  function showAlert(msg, type) {
    document.getElementById('alertBox').innerHTML =
      `<div class="alert alert-${type} py-2 mb-3" style="border-radius:10px;font-size:0.9rem">${msg}</div>`;
  }
</script>
</body>
</html>
